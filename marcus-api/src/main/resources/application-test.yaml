spring:
  application:
    name: marcus-parent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://200.200.201.4:5432/signal_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:200.200.201.4:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: my-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: io.marcus.domain,io.marcus.domain.model

  flyway:
    enabled: false
    baseline-on-migrate: true
  data:
    redis:
      url: ${SPRING_REDIS_URL:redis://200.200.201.4:6379}
marcus:
  security:
    master-key: coleemchangkhocchutnaocoleemchangquantamanhrasao
    salt: 944440b12311f820b2cf6acd2290b497
    jwt:
      secret: marcus-super-secret-key-change-me-at-least-32-bytes
      access-token-expiration-seconds: 3600
      refresh-token-expiration-seconds: 604800
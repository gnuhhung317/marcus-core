openapi: 3.0.3
info:
  title: Marcus Trading API Delta
  version: 0.2.0
  description: >-
    Contract-first delta for Marcus trading integration.
    This version completes High and Medium priority operations and standardizes
    reusable error responses.

servers:
  - url: /api/v1

tags:
  - name: auth
  - name: bots
  - name: subscriptions
  - name: dashboard
  - name: strategies
  - name: leaderboard
  - name: paper
  - name: profile
  - name: system
  - name: academy
  - name: content
  - name: market

paths:
  /auth/register:
    post:
      tags: [auth]
      operationId: authRegister
      summary: Register a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [auth]
      operationId: authLogin
      summary: Login and issue access and refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [auth]
      operationId: authRefresh
      summary: Refresh access token using a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token pair rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bots:
    get:
      tags: [bots]
      operationId: listPublicBotsWithFilters
      summary: List public bots with optional filters and pagination.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: asset
          in: query
          schema:
            type: string
        - name: risk
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Public bots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BotSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [bots]
      operationId: registerBot
      summary: Register a bot (developer role).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBotRequest'
      responses:
        '201':
          description: Bot registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotRegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /bots/{botId}:
    get:
      tags: [bots]
      operationId: getBotDetail
      summary: Get a single bot by ID.
      parameters:
        - $ref: '#/components/parameters/BotId'
      responses:
        '200':
          description: Bot detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bots/{botId}/performance:
    get:
      tags: [bots]
      operationId: getBotPerformance
      summary: Get performance metrics for a given bot.
      parameters:
        - $ref: '#/components/parameters/BotId'
      responses:
        '200':
          description: Bot performance metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotPerformanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bots/my-bots:
    get:
      tags: [bots]
      operationId: listDeveloperBots
      summary: List bots owned by current developer.
      responses:
        '200':
          description: Developer bots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BotSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /subscriptions/{botId}:
    post:
      tags: [subscriptions]
      operationId: subscribeBot
      summary: Subscribe current user to bot strategy.
      parameters:
        - $ref: '#/components/parameters/BotId'
      responses:
        '201':
          description: Subscribed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeBotResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /subscriptions/my-subscriptions:
    get:
      tags: [subscriptions]
      operationId: listMySubscriptions
      summary: List subscriptions for current user.
      responses:
        '200':
          description: Subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MySubscriptionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /signals:
    post:
      tags: [system]
      operationId: submitSignal
      summary: Ingest a trading signal into Marcus routing pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalSubmissionRequest'
      responses:
        '200':
          description: Signal accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalSubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    get:
      tags: [system]
      operationId: listSignals
      summary: List recent signals.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, DISPATCHED, FAILED, ALL]
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Signals.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SignalItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portfolio/summary:
    get:
      tags: [dashboard]
      operationId: getPortfolioSummary
      summary: Load portfolio summary for current user.
      responses:
        '200':
          description: Portfolio summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portfolio/positions:
    get:
      tags: [dashboard]
      operationId: listPortfolioPositions
      summary: Load open portfolio positions.
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Open positions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PositionItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/overview:
    get:
      tags: [dashboard]
      operationId: getDashboardOverview
      summary: Load KPI cards and top-level trading overview.
      responses:
        '200':
          description: Dashboard KPIs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/equity-series:
    get:
      tags: [dashboard]
      operationId: getDashboardEquitySeries
      summary: Load equity curve by selected range.
      parameters:
        - $ref: '#/components/parameters/Range'
      responses:
        '200':
          description: Time series points.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeriesPoint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/exchange-allocation:
    get:
      tags: [dashboard]
      operationId: getExchangeAllocation
      summary: Load exchange allocation for donut chart.
      responses:
        '200':
          description: Allocation list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExchangeAllocationItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /executions:
    get:
      tags: [system]
      operationId: listExecutions
      summary: Load paginated execution log entries.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Execution log page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionLogPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /strategies/{strategyId}:
    get:
      tags: [strategies]
      operationId: getStrategyDetail
      summary: Load strategy header and metadata.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
      responses:
        '200':
          description: Strategy detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /strategies/{strategyId}/metrics:
    get:
      tags: [strategies]
      operationId: getStrategyMetrics
      summary: Load strategy metrics (raw or after-fees).
      parameters:
        - $ref: '#/components/parameters/StrategyId'
        - name: feeMode
          in: query
          schema:
            type: string
            enum: [RAW, AFTER_FEES]
      responses:
        '200':
          description: Metrics payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyMetricsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /strategies/{strategyId}/performance-series:
    get:
      tags: [strategies]
      operationId: getStrategyPerformanceSeries
      summary: Load strategy performance series by range.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
        - $ref: '#/components/parameters/Range'
      responses:
        '200':
          description: Series points.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeriesPoint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /strategies/{strategyId}/trades:
    get:
      tags: [strategies]
      operationId: listStrategyTradeLogs
      summary: Paginated trade logs for strategy.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: asset
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Trade log page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeLogPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /strategies/{strategyId}/favorite:
    post:
      tags: [strategies]
      operationId: upsertFavoriteStrategy
      summary: Mark strategy as favorite for current user.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteStrategyRequest'
      responses:
        '200':
          description: Favorite updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteStrategyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /strategies/{strategyId}/export/pdf:
    post:
      tags: [strategies]
      operationId: exportStrategyReportPdf
      summary: Request PDF strategy report export.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
      responses:
        '202':
          description: Export accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /strategies/{strategyId}/export/json:
    post:
      tags: [strategies]
      operationId: exportStrategySnapshotJson
      summary: Request JSON snapshot export.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
      responses:
        '202':
          description: Export accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /strategies/{strategyId}/paper-history:
    get:
      tags: [strategies]
      operationId: listStrategyPaperHistory
      summary: Paginated paper trade history for a strategy.
      parameters:
        - $ref: '#/components/parameters/StrategyId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: range
          in: query
          schema:
            type: string
            enum: [1D, 1W, 1M, YTD, ALL]
      responses:
        '200':
          description: Paper history page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperTradeHistoryPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /leaderboard/strategies:
    get:
      tags: [leaderboard]
      operationId: listLeaderboardStrategies
      summary: List ranked strategies for leaderboard tables.
      parameters:
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [24H, 7D, 30D, ALL]
        - name: market
          in: query
          schema:
            type: string
        - name: asset
          in: query
          schema:
            type: string
        - name: rankMetric
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Leaderboard page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardStrategiesPage'
        '400':
          $ref: '#/components/responses/BadRequest'

  /leaderboard/featured:
    get:
      tags: [leaderboard]
      operationId: listLeaderboardFeatured
      summary: Get featured top leaderboard cards.
      responses:
        '200':
          description: Featured list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardFeaturedResponse'

  /leaderboard/spotlights:
    get:
      tags: [leaderboard]
      operationId: listStrategySpotlights
      summary: Get strategy spotlight cards.
      responses:
        '200':
          description: Spotlights.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategySpotlight'

  /academy/courses:
    get:
      tags: [academy]
      operationId: listAcademyCourses
      summary: List academy courses and learner progress metadata.
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Academy courses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademyCoursesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /academy/metrics:
    get:
      tags: [academy]
      operationId: getAcademyMetrics
      summary: Get academy KPI summary cards.
      responses:
        '200':
          description: Academy metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademyMetricsResponse'

  /content/blog/posts:
    get:
      tags: [content]
      operationId: listBlogPosts
      summary: List blog posts with category and search filters.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Blog post page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogPostsResponse'

  /content/blog/posts/{postId}:
    get:
      tags: [content]
      operationId: getBlogPostDetail
      summary: Get a single blog post by ID.
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Blog post detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogPostDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/newsletter/subscriptions:
    post:
      tags: [content]
      operationId: subscribeNewsletter
      summary: Subscribe email to Marcus newsletter feed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsletterSubscriptionRequest'
      responses:
        '201':
          description: Subscribed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterSubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /content/research/reports:
    get:
      tags: [content]
      operationId: listResearchReports
      summary: List research reports for portal cards.
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Research report page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchReportsResponse'

  /content/research/reports/library:
    get:
      tags: [content]
      operationId: listResearchLibraryFiles
      summary: List downloadable files in research library widget.
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Library files.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResearchLibraryFile'

  /content/research/reports/{reportId}/download:
    post:
      tags: [content]
      operationId: requestResearchReportDownload
      summary: Request downloadable URL for selected research report.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Download URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchReportDownloadResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /market/overview:
    get:
      tags: [market]
      operationId: getMarketOverview
      summary: Get market pulse stats for home and market pages.
      responses:
        '200':
          description: Market pulse overview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketOverviewResponse'

  /paper/session:
    get:
      tags: [paper]
      operationId: getPaperSessionSummary
      summary: Load paper trading session summary.
      responses:
        '200':
          description: Session summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperSessionSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bots/validate:
    post:
      tags: [bots]
      operationId: validateBotConfiguration
      summary: Validate bot wizard payload before registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotConfigurationValidationRequest'
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotConfigurationValidationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bots/drafts:
    post:
      tags: [bots]
      operationId: saveBotDraft
      summary: Save or update bot wizard draft for current user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveBotDraftRequest'
      responses:
        '200':
          description: Draft saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveBotDraftResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /paper/signals:
    get:
      tags: [paper]
      operationId: listPaperSignals
      summary: List active or recent paper signals.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, EXECUTED, EXPIRED, ALL]
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Signals.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaperSignalItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /paper/orders:
    post:
      tags: [paper]
      operationId: createPaperOrder
      summary: Create paper order from quick order form.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaperOrderRequest'
      responses:
        '201':
          description: Order accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /paper/session/pause:
    post:
      tags: [paper]
      operationId: pausePaperSession
      summary: Pause current paper trading session.
      responses:
        '200':
          description: Session paused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperSessionStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /paper/session/resume:
    post:
      tags: [paper]
      operationId: resumePaperSession
      summary: Resume current paper trading session.
      responses:
        '200':
          description: Session resumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperSessionStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /paper/logs:
    get:
      tags: [paper]
      operationId: listPaperExecutionLogs
      summary: Paginated execution logs for paper trading.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Log page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperExecutionLogPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags: [profile]
      operationId: getCurrentUserProfile
      summary: Get current user profile.
      responses:
        '200':
          description: User profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/preferences:
    put:
      tags: [profile]
      operationId: updateUserPreferences
      summary: Update current user preferences.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPreferencesRequest'
      responses:
        '200':
          description: Preferences updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/api-keys:
    get:
      tags: [profile]
      operationId: listApiKeys
      summary: List API keys of current user.
      responses:
        '200':
          description: API key list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeySummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [profile]
      operationId: createApiKey
      summary: Create a new API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/api-keys/{apiKeyId}:
    delete:
      tags: [profile]
      operationId: deleteApiKey
      summary: Revoke an API key.
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '204':
          description: API key revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/login-activities:
    get:
      tags: [profile]
      operationId: listLoginActivities
      summary: Paginated login activity audit logs.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Login activity page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginActivityPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /system/connectivity:
    get:
      tags: [system]
      operationId: getSystemConnectivityHealth
      summary: Load connectivity health for core external dependencies.
      responses:
        '200':
          description: Connectivity health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectivityHealthResponse'

  /system/execution-logs:
    get:
      tags: [system]
      operationId: listSystemExecutionLogs
      summary: Paginated system execution logs.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: System execution logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionLogPage'

  /system/webhook-health:
    get:
      tags: [system]
      operationId: getWebhookHealth
      summary: Load webhook and stream processing latency health.
      responses:
        '200':
          description: Webhook latency and status summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookHealthResponse'

components:
  parameters:
    BotId:
      name: botId
      in: path
      required: true
      schema:
        type: string
    StrategyId:
      name: strategyId
      in: path
      required: true
      schema:
        type: string
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        type: string
    PostId:
      name: postId
      in: path
      required: true
      schema:
        type: string
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
    Q:
      name: q
      in: query
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Range:
      name: range
      in: query
      required: true
      schema:
        type: string
        enum: [1D, 1W, 1M, YTD, ALL]

  responses:
    BadRequest:
      description: Bad request.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationFailed:
      description: Validation failed.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalServerError:
      description: Internal server error.
      headers:
        X-Trace-Id:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'


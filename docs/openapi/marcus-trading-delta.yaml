          type: number
          format: double
        throughputPerMinute:
          type: integer
        bins:
          type: array
          items:
            $ref: '#/components/schemas/WebhookLatencyBin'

    ErrorResponse:
      type: object
      required: [code, message, status, traceId, path, timestamp]
      properties:
        code:
          type: string
          description: Stable application error code.
        message:
          type: string
        status:
          type: integer
          format: int32
        traceId:
          type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time

    FieldValidationError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [errors]
          properties:
            errors:
              type: array
              items:
                $ref: '#/components/schemas/FieldValidationError'
